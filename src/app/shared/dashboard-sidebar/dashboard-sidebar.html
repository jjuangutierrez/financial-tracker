<aside>
  <h2>Portfolios</h2>
  <div class="add-portfolio" (click)="addPortfolio()">
    <span class="material-symbols-outlined"> new_window </span>

    <span>Add new portfolio</span>
  </div>
  <ul>
    @for (portfolio of portfolioService.portfolios(); track $index) {
    <li>
      <app-sidebar-item [portfolio]="portfolio"></app-sidebar-item>
    </li>
    }
  </ul>
</aside>
